<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BukuKas Elegan - Solusi Pembukuan Keuangan</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

        tailwind.config = {

                    },

                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;

</head>
<body class="font-sans text-slate-800 antialiased pb-24 lg:pb-6">

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'pembukuan-elegan-default';
        const firebaseConfig = JSON.parse(__firebase_config);
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.appState = {
            user: null,
            bookId: 'default-book',
            currentTab: 'dashboard',
            tickets: [],
            expenses: [],
            credits: [],
            savings: { tabungan: 0, darurat: 0 },
            deductions: [],
            manualIncomes: []
        };

        // UI Helpers
        const formatRupiah = (number) => {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(number);
        };

        const showNotification = (message, type = 'success') => {
            const notif = document.getElementById('notification');
            const notifText = document.getElementById('notification-text');
            const notifIcon = document.getElementById('notification-icon');
            
            notifText.innerText = message;
            if (type === 'success') {
                notif.className = "fixed top-4 right-4 left-4 md:left-auto md:w-96 bg-emerald-500 text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 transform transition-all duration-300 z-50";
                notifIcon.className = "fa-solid fa-circle-check";
            } else {
                notif.className = "fixed top-4 right-4 left-4 md:left-auto md:w-96 bg-rose-500 text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 transform transition-all duration-300 z-50";
                notifIcon.className = "fa-solid fa-circle-exclamation";
            }
            
            notif.classList.remove('translate-y-[-100px]', 'opacity-0');
            setTimeout(() => {
                notif.classList.add('translate-y-[-100px]', 'opacity-0');
            }, 3000);
        };

        // Copy Link to Share
        window.copyShareLink = () => {
            const shareUrl = `${window.location.origin}${window.location.pathname}#${window.appState.bookId}`;
            
            const tempInput = document.createElement('input');
            tempInput.value = shareUrl;
            document.body.appendChild(tempInput);
            tempInput.select();
            try {
                document.execCommand('copy');
                showNotification("Tautan pembukuan disalin! Bagikan ke perangkat lain.");
            } catch (err) {
                showNotification("Gagal menyalin tautan secara otomatis.", "error");
            }
            document.body.removeChild(tempInput);
        };

        // Determine unique book ID from URL hash or generate new one
        const initBookId = () => {
            let hash = window.location.hash.substring(1);
            if (!hash) {
                hash = 'buku-' + Math.random().toString(36).substring(2, 11);
                window.location.hash = hash;
            }
            window.appState.bookId = hash;
            document.getElementById('share-code-display').innerText = hash;
            document.getElementById('share-link-input').value = `${window.location.origin}${window.location.pathname}#${hash}`;
        };

        // Handle authentication and database binding
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                showNotification("Koneksi gagal. Silakan muat ulang halaman.", "error");
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.appState.user = user;
                initBookId();
                bindDatabase();
            }
        });

        // Firestore Path Helper (Strict Path Rule 1)
        const getCollectionRef = (collectionName) => {
            return collection(db, 'artifacts', appId, 'public', 'data', `${window.appState.bookId}_${collectionName}`);
        };

        let unsubscribes = [];
        const bindDatabase = () => {
            unsubscribes.forEach(unsub => unsub());
            unsubscribes = [];

            if (!window.appState.user) return;

            // Load Tickets
            const unsubTickets = onSnapshot(getCollectionRef('tickets'), (snapshot) => {
                window.appState.tickets = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAll();
            }, (err) => {
                showNotification("Gagal memuat data tiket.", "error");
            });
            unsubscribes.push(unsubTickets);

            // Load Expenses
            const unsubExpenses = onSnapshot(getCollectionRef('expenses'), (snapshot) => {
                window.appState.expenses = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAll();
            }, (err) => {
                showNotification("Gagal memuat data pengeluaran.", "error");
            });
            unsubscribes.push(unsubExpenses);

            // Load Credits
            const unsubCredits = onSnapshot(getCollectionRef('credits'), (snapshot) => {
                window.appState.credits = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAll();
            }, (err) => {
                showNotification("Gagal memuat data kredit.", "error");
            });
            unsubscribes.push(unsubCredits);

            // Load Savings
            const unsubSavings = onSnapshot(getCollectionRef('savings'), (snapshot) => {
                if (!snapshot.empty) {
                    const data = snapshot.docs[0].data();
                    window.appState.savings = { id: snapshot.docs[0].id, ...data };
                } else {
                    window.appState.savings = { tabungan: 0, darurat: 0 };
                }
                renderAll();
            }, (err) => {
                showNotification("Gagal memuat data tabungan.", "error");
            });
            unsubscribes.push(unsubSavings);

            // Load Deductions (Izin)
            const unsubDeductions = onSnapshot(getCollectionRef('deductions'), (snapshot) => {
                window.appState.deductions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAll();
            }, (err) => {
                showNotification("Gagal memuat data izin.", "error");
            });
            unsubscribes.push(unsubDeductions);

            // Load Manual Incomes
            const unsubManualIncomes = onSnapshot(getCollectionRef('manual_incomes'), (snapshot) => {
                window.appState.manualIncomes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAll();
            }, (err) => {
                showNotification("Gagal memuat data pendapatan manual.", "error");
            });
            unsubscribes.push(unsubManualIncomes);
        };

        const calculateTicketEarnings = (ticket) => {
            if (ticket.status !== 'completed') return 0;
            return ticket.type === 'maintenance' ? 50000 : 25000;
        };

        const getDisbursementDate = (ticketDateStr) => {
            const date = new Date(ticketDateStr);
            const day = date.getDay(); // 0 = Sun, 1 = Mon, ..., 6 = Sat
            
            let daysToNextTuesday;
            if (day === 0) { // Sunday
                daysToNextTuesday = 2; // Next Tuesday
            } else {
                daysToNextTuesday = 9 - day; // Next week's Tuesday
            }
            
            const disburseDate = new Date(date);
            disburseDate.setDate(date.getDate() + daysToNextTuesday);
            return disburseDate.toISOString().split('T')[0];
        };

        // Render Data Function
        const renderAll = () => {
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            
            // Filter Search Ticket
            const searchInput = document.getElementById('search-ticket-input').value.toLowerCase();
            const filteredTickets = window.appState.tickets.filter(t => 
                t.ticketId.toLowerCase().includes(searchInput) || 
                t.customerId.toLowerCase().includes(searchInput)
            );

            // Compute Financial Metrics
            let totalDailyIncome = 0;
            let totalWeeklyIncome = 0;
            let totalMonthlyIncome = 0;

            let totalDailyExpense = 0;
            let totalWeeklyExpense = 0;
            let totalMonthlyExpense = 0;

            const now = new Date();
            const startOfWeek = new Date(now.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1))); // Monday of current week
            startOfWeek.setHours(0,0,0,0);
            
            const startOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);

            // --- CALCULATE EXPENSES ---
            window.appState.expenses.forEach(exp => {
                const expDate = new Date(exp.date);
                const isToday = exp.date === todayStr;
                const isThisWeek = expDate >= startOfWeek;
                const isThisMonth = expDate >= startOfMonth;

                if (isToday) totalDailyExpense += Number(exp.amount);
                if (isThisWeek) totalWeeklyExpense += Number(exp.amount);
                if (isThisMonth) totalMonthlyExpense += Number(exp.amount);
            });

            // --- CALCULATE SYSTEM INCOME ---
            let basicSalary = 0;
            const salaryPaidThisMonth = today.getDate() >= 5;
            if (salaryPaidThisMonth) {
                basicSalary = 2000000;
            }

            let totalDeductionsThisMonth = 0;
            let totalDeductionsThisWeek = 0;
            let totalDeductionsToday = 0;

            window.appState.deductions.forEach(ded => {
                const dedDate = new Date(ded.date);
                const isToday = ded.date === todayStr;
                const isThisWeek = dedDate >= startOfWeek;
                const isThisMonth = dedDate >= startOfMonth;

                if (isToday) totalDeductionsToday += 50000;
                if (isThisWeek) totalDeductionsThisWeek += 50000;
                if (isThisMonth) totalDeductionsThisMonth += 50000;
            });

            // Ticket Income logic
            window.appState.tickets.forEach(ticket => {
                if (ticket.status === 'completed') {
                    const ticketVal = calculateTicketEarnings(ticket);
                    const disburseDateStr = getDisbursementDate(ticket.date);
                    const disburseDate = new Date(disburseDateStr);

                    const isDisburseToday = disburseDateStr === todayStr;
                    const isDisburseThisWeek = disburseDate >= startOfWeek;
                    const isDisburseThisMonth = disburseDate >= startOfMonth;

                    if (isDisburseToday) totalDailyIncome += ticketVal;
                    if (isDisburseThisWeek) totalWeeklyIncome += ticketVal;
                    if (isDisburseThisMonth) totalMonthlyIncome += ticketVal;
                }
            });

            // Add manual incomes
            window.appState.manualIncomes.forEach(inc => {
                const incDate = new Date(inc.date);
                const isToday = inc.date === todayStr;
                const isThisWeek = incDate >= startOfWeek;
                const isThisMonth = incDate >= startOfMonth;

                if (isToday) totalDailyIncome += Number(inc.amount);
                if (isThisWeek) totalWeeklyIncome += Number(inc.amount);
                if (isThisMonth) totalMonthlyIncome += Number(inc.amount);
            });

            // Deduct from total
            totalMonthlyIncome += basicSalary;
            totalMonthlyIncome -= totalDeductionsThisMonth;
            totalWeeklyIncome -= totalDeductionsThisWeek;
            totalDailyIncome -= totalDeductionsToday;

            totalMonthlyIncome = Math.max(0, totalMonthlyIncome);
            totalWeeklyIncome = Math.max(0, totalWeeklyIncome);
            totalDailyIncome = Math.max(0, totalDailyIncome);

            // --- RENDER FINANCIAL CARD HIGHLIGHTS ---
            document.getElementById('income-daily').innerText = formatRupiah(totalDailyIncome);
            document.getElementById('income-weekly').innerText = formatRupiah(totalWeeklyIncome);
            document.getElementById('income-monthly').innerText = formatRupiah(totalMonthlyIncome);

            document.getElementById('expense-daily').innerText = formatRupiah(totalDailyExpense);
            document.getElementById('expense-weekly').innerText = formatRupiah(totalWeeklyExpense);
            document.getElementById('expense-monthly').innerText = formatRupiah(totalMonthlyExpense);

            // Net balance estimation
            const netBalance = totalMonthlyIncome - totalMonthlyExpense;
            const balanceEl = document.getElementById('net-balance');
            balanceEl.innerText = formatRupiah(netBalance);
            if (netBalance >= 0) {
                balanceEl.className = "text-3xl font-extrabold text-emerald-600";
            } else {
                balanceEl.className = "text-3xl font-extrabold text-rose-600";
            }

            // Sync with bottom navigation for phone
            const bottomBal = document.getElementById('bottom-net-balance');
            if (bottomBal) {
                bottomBal.innerText = formatRupiah(netBalance);
                bottomBal.className = netBalance >= 0 ? "text-sm font-extrabold text-emerald-600" : "text-sm font-extrabold text-rose-600";
            }

            // Render emergency & savings
            document.getElementById('display-savings').innerText = formatRupiah(window.appState.savings.tabungan || 0);
            document.getElementById('display-emergency').innerText = formatRupiah(window.appState.savings.darurat || 0);
            document.getElementById('display-savings-dash').innerText = formatRupiah(window.appState.savings.tabungan || 0);
            document.getElementById('display-emergency-dash').innerText = formatRupiah(window.appState.savings.darurat || 0);

            // Render Salary Info
            document.getElementById('salary-status-text').innerText = salaryPaidThisMonth 
                ? "Gaji pokok Rp 2.000.000 bulan ini sudah masuk (Tanggal 5)" 
                : "Gaji pokok Rp 2.000.000 akan dicairkan pada tanggal 5 mendatang.";
            document.getElementById('deduction-total-text').innerText = `Total Potongan Izin Bulan Ini: -${formatRupiah(totalDeductionsThisMonth)}`;

            // --- RENDER TICKETS ---
            const ticketsListContainer = document.getElementById('tickets-list');
            ticketsListContainer.innerHTML = '';

            if (filteredTickets.length === 0) {
                ticketsListContainer.innerHTML = `
                    <div class="text-center py-12 text-slate-400">
                        <i class="fa-solid fa-clipboard-list text-5xl mb-3 text-slate-300"></i>
                        <p class="text-sm">Tidak ada tiket jadwal yang ditemukan.</p>
                    </div>
                `;
            } else {
                const sortedTickets = [...filteredTickets].sort((a,b) => {
                    if (a.status === 'scheduled' && b.status !== 'scheduled') return -1;
                    if (a.status !== 'scheduled' && b.status === 'scheduled') return 1;
                    return new Date(b.date) - new Date(a.date);
                });

                sortedTickets.forEach(ticket => {
                    const ticketEarnings = ticket.type === 'maintenance' ? 50000 : 25000;
                    const typeLabel = ticket.type === 'maintenance' ? 'Maintenance (50rb)' : 'Bantuan Tim (25rb)';
                    const disburseDateStr = getDisbursementDate(ticket.date);
                    
                    let statusBadge = '';
                    let actionButtons = '';

                    if (ticket.status === 'scheduled') {
                        statusBadge = `<span class="bg-amber-100 text-amber-800 text-xs font-semibold px-2.5 py-1 rounded-full"><i class="fa-solid fa-clock mr-1"></i>Penjadwalan</span>`;
                        actionButtons = `
                            <button onclick="updateTicketStatus('${ticket.id}', 'completed')" class="bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-semibold py-1.5 px-3 rounded-xl flex items-center gap-1 transition">
                                <i class="fa-solid fa-check"></i> Selesai
                            </button>
                            <button onclick="updateTicketStatus('${ticket.id}', 'canceled')" class="bg-slate-200 hover:bg-slate-300 text-slate-700 text-xs font-semibold py-1.5 px-3 rounded-xl flex items-center gap-1 transition">
                                <i class="fa-soli
